<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kairos Kernel · v1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c12;
            font-family: 'SF Mono', 'Courier New', monospace;
            padding: 1.5rem;
            color: #d4e0ed;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.5rem; color: #d4956a; margin-bottom: 0.5rem; }
        .sub { color: #6a7a8a; margin-bottom: 2rem; border-bottom: 1px solid #1e2535; padding-bottom: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #0f141e; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 1rem; text-align: center; }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: #d4956a; }
        .stat-label { font-size: 0.65rem; color: #6a7a8a; text-transform: uppercase; }
        .panel { background: #0b0e16; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 1.2rem; margin-bottom: 1.5rem; }
        .panel h2 { font-size: 0.9rem; margin-bottom: 1rem; padding-left: 0.5rem; border-left: 2px solid; }
        .panel.hermes h2 { border-color: #d4956a; color: #d4956a; }
        .panel.hephaestus h2 { border-color: #e07040; color: #e07040; }
        .panel.demeter h2 { border-color: #6b8e23; color: #6b8e23; }
        button { background: #1e2535; border: none; color: #d4e0ed; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.7rem; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        button:hover { background: #d4956a; color: #0a0c12; }
        .status { font-size: 0.65rem; margin-top: 0.5rem; color: #6a7a8a; }
        .log-area { background: #060810; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 0.8rem; max-height: 150px; overflow-y: auto; font-size: 0.7rem; }
        .log-entry { padding: 0.2rem 0; border-bottom: 1px solid #1a1f2a; color: #6a7a8a; }
        .log-entry.success { color: #6b8e23; }
        .recent-list { max-height: 200px; overflow-y: auto; font-size: 0.7rem; }
        .recent-item { padding: 0.2rem 0; border-bottom: 1px solid #1a1f2a; }
        hr { border-color: #1e2535; margin: 0.5rem 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>Kairos Kernel</h1>
    <div class="sub">Orchestrator · Hermes · Hephaestus · Demeter</div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number" id="hermesCount">—</div><div class="stat-label">Hermes Words</div></div>
        <div class="stat-card"><div class="stat-number" id="hephCount">—</div><div class="stat-label">Hephaestus Phrases</div></div>
        <div class="stat-card"><div class="stat-number" id="demeterCount">—</div><div class="stat-label">Demeter Approved</div></div>
    </div>

    <div class="panel hermes">
        <h2>Hermes · Word Scraper</h2>
        <button id="runHermes">Run Scrape</button>
        <button id="pruneHermes">Prune Low Quality</button>
        <div class="status" id="hermesStatus">Idle</div>
        <div id="hermesRecent" class="recent-list">Loading...</div>
    </div>

    <div class="panel hephaestus">
        <h2>Hephaestus · Phrase Forge</h2>
        <button id="runHephaestus">Forge Phrases</button>
        <button id="clearHephaestus">Clear Phrases</button>
        <div class="status" id="hephStatus">Idle</div>
        <div id="hephRecent" class="recent-list">Loading...</div>
    </div>

    <div class="panel demeter">
        <h2>Demeter · Quality Gate</h2>
        <button id="approveAll">Approve High Quality (≥65)</button>
        <div class="status" id="demeterStatus">Idle</div>
        <div id="demeterRecent" class="recent-list">Loading...</div>
    </div>

    <div class="log-area" id="logArea"><div class="log-entry">Kernel ready.</div></div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
    let db = null;

    function addLog(msg, type) {
        const log = document.getElementById('logArea');
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + (type || 'info');
        entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        log.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function loadStats() {
        if (!db) return;
        const { count: hc } = await db.from('hermes_entries').select('*', { count: 'exact', head: true });
        const { count: pc } = await db.from('hephaestus_phrases').select('*', { count: 'exact', head: true });
        const { count: dc } = await db.from('demeter_approved').select('*', { count: 'exact', head: true });
        document.getElementById('hermesCount').innerText = hc || 0;
        document.getElementById('hephCount').innerText = pc || 0;
        document.getElementById('demeterCount').innerText = dc || 0;
    }

    async function loadRecent() {
        if (!db) return;
        const { data: words } = await db.from('hermes_entries').select('body').order('created_at', { ascending: false }).limit(5);
        document.getElementById('hermesRecent').innerHTML = words?.map(w => '<div class="recent-item">' + w.body + '</div>').join('') || '<div class="recent-item">No words</div>';
        
        const { data: phrases } = await db.from('hephaestus_phrases').select('phrase, score').order('created_at', { ascending: false }).limit(5);
        document.getElementById('hephRecent').innerHTML = phrases?.map(p => '<div class="recent-item">' + p.phrase + ' (' + p.score + '%)</div>').join('') || '<div class="recent-item">No phrases</div>';
        
        const { data: approved } = await db.from('demeter_approved').select('phrase').order('created_at', { ascending: false }).limit(5);
        document.getElementById('demeterRecent').innerHTML = approved?.map(a => '<div class="recent-item">' + a.phrase + '</div>').join('') || '<div class="recent-item">No approved</div>';
    }

    async function runHermes() {
        addLog('Hermes: scraping...', 'info');
        document.getElementById('hermesStatus').innerHTML = 'Scraping...';
        // Simple scrape simulation
        const response = await fetch('https://www.reddit.com/r/all/top.json?limit=10&t=day');
        const data = await response.json();
        const titles = data.data.children.map(c => c.data.title);
        const words = titles.join(' ').toLowerCase().split(/\s+/).filter(w => w.length > 3 && w.length < 12).slice(0, 10);
        let added = 0;
        for (const w of words) {
            const expires = new Date(); expires.setDate(expires.getDate() + 3);
            const { error } = await db.from('hermes_entries').upsert({
                body: w, label: 'reddit_' + w + '_' + Date.now(), word_count: 1,
                word_type: 'noun', source: 'reddit', trending_score: 50, expires_at: expires.toISOString()
            }, { onConflict: 'body,source' });
            if (!error) added++;
        }
        addLog('Hermes added ' + added + ' words', 'success');
        document.getElementById('hermesStatus').innerHTML = 'Ready (' + added + ' new)';
        await loadStats();
        await loadRecent();
    }

    async function pruneHermes() {
        const { data } = await db.from('hermes_entries').delete().lt('trending_score', 35).select();
        addLog('Pruned ' + (data?.length || 0) + ' low-quality words', 'info');
        await loadStats();
        await loadRecent();
    }

    async function runHephaestus() {
        addLog('Hephaestus: forging phrases...', 'info');
        const { data: words } = await db.from('hermes_entries').select('body').gt('trending_score', 40).limit(20);
        if (!words || words.length < 3) { addLog('Not enough words', 'warning'); return; }
        await db.from('hephaestus_phrases').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        const phrases = [];
        const nouns = words.map(w => w.body);
        for (let i = 0; i < 15; i++) {
            const n1 = nouns[Math.floor(Math.random() * nouns.length)];
            const n2 = nouns[Math.floor(Math.random() * nouns.length)];
            const phrase = n1.charAt(0).toUpperCase() + n1.slice(1) + ' ' + n2;
            phrases.push({ phrase: phrase, score: Math.floor(Math.random() * 50) + 30 });
        }
        let saved = 0;
        for (const p of phrases) {
            const exp = new Date(); exp.setDate(exp.getDate() + 7);
            const { error } = await db.from('hephaestus_phrases').insert({ phrase: p.phrase, score: p.score, expires_at: exp.toISOString() });
            if (!error) saved++;
        }
        addLog('Hephaestus forged ' + saved + ' phrases', 'success');
        await loadStats();
        await loadRecent();
    }

    async function clearHephaestus() {
        await db.from('hephaestus_phrases').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        addLog('Cleared all phrases', 'info');
        await loadStats();
        await loadRecent();
    }

    function scorePhrase(phrase) {
        let score = 50;
        const strong = ['ai', 'code', 'agent', 'model', 'data', 'cloud', 'intelligence', 'claude', 'openai'];
        const weak = ['drug', 'turbo', 'paraloid', 'kash', 'patel', 'went', 'souls'];
        const lower = phrase.toLowerCase();
        for (const s of strong) if (lower.includes(s)) score += 10;
        for (const w of weak) if (lower.includes(w)) score -= 15;
        return Math.min(100, Math.max(0, score));
    }

    async function approveAllHigh() {
        addLog('Demeter: approving high-quality phrases...', 'info');
        const { data: phrases } = await db.from('hephaestus_phrases').select('id, phrase');
        if (!phrases) return;
        let approved = 0;
        for (const p of phrases) {
            const score = scorePhrase(p.phrase);
            if (score >= 65) {
                const { error } = await db.from('demeter_approved').upsert({ phrase: p.phrase, original_id: p.id, affinity_score: score }, { onConflict: 'phrase' });
                if (!error) approved++;
            }
        }
        addLog('Demeter approved ' + approved + ' phrases', 'success');
        await loadStats();
        await loadRecent();
    }

    document.getElementById('runHermes').onclick = runHermes;
    document.getElementById('pruneHermes').onclick = pruneHermes;
    document.getElementById('runHephaestus').onclick = runHephaestus;
    document.getElementById('clearHephaestus').onclick = clearHephaestus;
    document.getElementById('approveAll').onclick = approveAllHigh;

    async function init() {
        if (!window.supabase) { addLog('Supabase not loaded', 'error'); return; }
        db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await loadStats();
        await loadRecent();
        addLog('Kernel ready', 'success');
    }
    init();
})();
</script>
</body>
</html>
